<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectHub — Login</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #eef2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
    }

    .card {
      width: min(760px, 100%);
      background: #ffffff;
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 32px 90px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 2.5vw, 2.8rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      color: #475569;
      line-height: 1.75;
    }

    .switch-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .switch-button {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      padding: 16px 20px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .switch-button.active {
      background: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.18);
    }

    .switch-button:hover {
      transform: translateY(-1px);
    }

    .auth-form {
      display: none;
      gap: 16px;
    }

    .auth-form.active {
      display: grid;
    }

    .form-group {
      display: grid;
      gap: 10px;
    }

    label {
      font-weight: 700;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 9999px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      margin-top: 8px;
      width: max-content;
    }

    .file-button:hover {
      transform: translateY(-1px);
      background: #eff6ff;
      border-color: #93c5fd;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .hidden-file {
      display: none;
    }

    .avatar-preview {
      display: grid;
      place-items: center;
      width: 120px;
      height: 120px;
      border-radius: 9999px;
      background: #eff6ff;
      color: #0f172a;
      font-weight: 700;
      border: 1px dashed #93c5fd;
      text-align: center;
      padding: 16px;
      margin-top: 8px;
      overflow: hidden;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .button-primary {
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button-primary:hover {
      transform: translateY(-1px);
    }

    .forgot-link {
      border: none;
      background: transparent;
      color: #1d4ed8;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      padding: 0;
      text-decoration: underline;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .forgot-link.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .message {
      min-height: 24px;
      margin-top: 18px;
      font-size: 0.98rem;
      color: #0f766e;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      .switch-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login or create your ConnectHub account</h1>
    <p>Sign in if you already have an account, or sign up to get started with profile setup.</p>

    <div class="switch-buttons">
      <button type="button" class="switch-button active" id="signInTab">Sign In</button>
      <button type="button" class="switch-button" id="signUpTab">Sign Up</button>
    </div>

    <form class="auth-form active" id="signInForm">
      <div class="form-group">
        <label for="signin-email">Email address</label>
        <input id="signin-email" name="signinEmail" type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="signin-password">Password</label>
        <input id="signin-password" name="signinPassword" type="password" placeholder="Enter your password" required minlength="6" />
      </div>
      <button type="submit" class="button-primary">Sign In</button>
      <button type="button" class="forgot-link" id="forgotPasswordBtn">Forgot password?</button>
    </form>

    <form class="auth-form" id="signUpForm">
      <div class="form-group">
        <label for="signup-name">What should we call you?</label>
        <input id="signup-name" name="signupName" type="text" placeholder="Jane Doe" required />
      </div>
      <div class="form-group">
        <label for="signup-email">Email address</label>
        <input id="signup-email" name="signupEmail" type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="signup-password">Create password</label>
        <input id="signup-password" name="signupPassword" type="password" placeholder="Choose a password" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="signup-image">Profile picture (optional)</label>
        <input id="signup-image" name="signupImage" type="file" accept="image/*" class="hidden-file" />
        <label class="file-button" for="signup-image">Choose image</label>
        <div class="avatar-preview" id="signupImagePreview">No image selected</div>
      </div>
      <button type="submit" class="button-primary">Sign Up</button>
    </form>

    <div class="message" id="statusMessage"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://rnehrffbfrrcaopzbaor.supabase.co';
    const supabaseKey = 'sb_publishable_8MdQrhDQd7YymNOMLWMzDg_vv_wvpf9';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const signInTab = document.getElementById('signInTab');
    const signUpTab = document.getElementById('signUpTab');
    const signInForm = document.getElementById('signInForm');
    const signUpForm = document.getElementById('signUpForm');
    const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
    const statusMessage = document.getElementById('statusMessage');
    const signupImageInput = document.getElementById('signup-image');
    const signupImagePreview = document.getElementById('signupImagePreview');

    let failedSignInAttempts = 0;
    let signupAvatarImage = null;

    function updateSignupPreview() {
      signupImagePreview.style.background = '#eff6ff';
      if (!signupAvatarImage) {
        const letter = signUpForm.signupName.value.trim()[0]?.toUpperCase() || 'A';
        signupImagePreview.textContent = letter;
      }
    }
    signupImageInput.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) {
        signupAvatarImage = null;
        signupImagePreview.textContent = 'No image selected';
        updateSignupPreview();
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        signupAvatarImage = reader.result;
        signupImagePreview.innerHTML = `<img src="${signupAvatarImage}" alt="Avatar preview" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
      };
      reader.readAsDataURL(file);
    });

    function showForm(form) {
      signInForm.classList.toggle('active', form === signInForm);
      signUpForm.classList.toggle('active', form === signUpForm);
      signInTab.classList.toggle('active', form === signInForm);
      signUpTab.classList.toggle('active', form === signUpForm);
      if (form !== signInForm) {
        forgotPasswordBtn.classList.remove('visible');
      }
      statusMessage.textContent = '';
    }

    async function signUp(name, email, password) {
      const { data, error } = await _supabase.auth.signUp({
        email,
        password,
        options: { data: { name } }
      });
      return { data, error };
    }

    async function signIn(email, password) {
      const { data, error } = await _supabase.auth.signInWithPassword({
        email,
        password
      });
      if (error) {
        return { error };
      }
      return { user: data.user };
    }

    function loadLocalUsers() {
      try {
        return JSON.parse(localStorage.getItem('ch_users') || '[]');
      } catch {
        return [];
      }
    }

    function saveLocalUsers(users) {
      localStorage.setItem('ch_users', JSON.stringify(users));
    }

    function upsertLocalUser(user) {
      const users = loadLocalUsers();
      const existingIndex = users.findIndex((item) => item.id === user.id);
      if (existingIndex >= 0) {
        users[existingIndex] = { ...users[existingIndex], ...user };
      } else {
        users.push(user);
      }
      saveLocalUsers(users);
      return user;
    }

    function getResetRedirectUrl() {
      if (window.location.protocol.startsWith('http')) {
        return window.location.origin + '/reset.html';
      }
      return null;
    }

    async function resetPassword(email) {
      const redirectTo = getResetRedirectUrl();
      if (!redirectTo) {
        statusMessage.textContent = 'Password reset requires serving the app over http://localhost, not opening files directly.';
        statusMessage.style.color = '#b91c1c';
        return;
      }
      const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo });
      if (error) {
        statusMessage.textContent = error.message;
        statusMessage.style.color = '#b91c1c';
        return;
      }
      statusMessage.textContent = 'Password reset email sent. Please check your inbox.';
      statusMessage.style.color = '#0f766e';
    }

    signInTab.addEventListener('click', () => showForm(signInForm));
    signUpTab.addEventListener('click', () => showForm(signUpForm));

    forgotPasswordBtn.addEventListener('click', () => {
      const email = signInForm.signinEmail.value.trim();
      if (!email) {
        statusMessage.textContent = 'Enter your email address to reset your password.';
        statusMessage.style.color = '#b91c1c';
        return;
      }
      resetPassword(email);
    });

    signInForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = signInForm.signinEmail.value.trim();
      const password = signInForm.signinPassword.value;
      if (!email || !password) {
        statusMessage.textContent = 'Enter both email and password.';
        statusMessage.style.color = '#b91c1c';
        return;
      }
      const result = await signIn(email, password);
      if (result.error) {
        failedSignInAttempts += 1;
        statusMessage.textContent = result.error.message;
        statusMessage.style.color = '#b91c1c';
        if (failedSignInAttempts >= 3) {
          forgotPasswordBtn.classList.add('visible');
        }
        return;
      }
      const userId = result.user.id;
      const displayName = result.user?.user_metadata?.name || email;
      const users = loadLocalUsers();
      const storedUser = users.find((item) => item.id === userId);
      if (storedUser) {
        sessionStorage.setItem('welcomeName', storedUser.name || displayName);
        sessionStorage.setItem('welcomeEmail', storedUser.email || email);
        if (storedUser.avatarImage) {
          sessionStorage.setItem('welcomeAvatarImage', storedUser.avatarImage);
        } else {
          sessionStorage.removeItem('welcomeAvatarImage');
        }
      } else {
        upsertLocalUser({
          id: userId,
          name: displayName,
          email,
          avatarImage: null,
          followers: 0,
          following: 0
        });
        sessionStorage.setItem('welcomeName', displayName);
        sessionStorage.setItem('welcomeEmail', email);
        sessionStorage.removeItem('welcomeAvatarImage');
      }
      sessionStorage.setItem('currentUserId', userId);
      window.location.href = 'welcome.html';
    });

    signUpForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const name = signUpForm.signupName.value.trim();
      const email = signUpForm.signupEmail.value.trim();
      const password = signUpForm.signupPassword.value;
      if (!name || !email || !password) {
        statusMessage.textContent = 'Complete all fields to create your account.';
        statusMessage.style.color = '#b91c1c';
        return;
      }
      const result = await signUp(name, email, password);
      if (result.error) {
        statusMessage.textContent = result.error.message;
        statusMessage.style.color = '#b91c1c';
        return;
      }
      const user = result.data.user || result.data.session?.user;
      if (!user) {
        statusMessage.textContent = 'Account created. Please verify your email before signing in.';
        statusMessage.style.color = '#0f766e';
        return;
      }
      upsertLocalUser({
        id: user.id,
        name,
        email,
        avatarImage: signupAvatarImage || null,
        followers: 0,
        following: 0
      });
      sessionStorage.setItem('welcomeName', name);
      sessionStorage.setItem('welcomeEmail', email);
      sessionStorage.setItem('currentUserId', user.id);
      if (signupAvatarImage) {
        sessionStorage.setItem('welcomeAvatarImage', signupAvatarImage);
      } else {
        sessionStorage.removeItem('welcomeAvatarImage');
      }
      window.location.href = 'welcome.html';
    });
  </script>
</body>
</html>
