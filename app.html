<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectHub — Feed</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #000000;
      --text: #000000;
      --primary: #1d4ed8;
      --secondary: #f8fafc;
      --surface: #ffffff;
      --border: #cbd5e1;
      --danger: #b91c1c;
      --danger-soft: #fecaca;
      background: #eef2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #eef2ff;
      display: flex;
      flex-direction: column;
    }
    .screen {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      padding: 20px;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
    }
    .topbar {
      display: grid;
      gap: 16px;
    }
    .search-box {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 10px 14px;
      max-width: 520px;
      margin: 0 auto;
      color: #000000;
    }
    .search-box input {
      border: none;
      width: 100%;
      font-size: 0.95rem;
      outline: none;
      min-width: 0;
      color: #000000;
    }
    .search-box svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }
    .section-title {
      margin: 0;
      font-size: 1.1rem;
      color: #000000;
      font-weight: 700;
    }
    .feed-area {
      display: grid;
      gap: 18px;
    }
    .post-card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: #dbeafe;
      color: #000000;
      font-weight: 700;
      font-size: 1rem;
    }
    .post-meta {
      display: grid;
      gap: 4px;
    }
    .post-meta strong {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.98rem;
    }
    .post-meta span {
      color: #000000;
    }
    .badge {
      background: #fde047;
      color: #000000;
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
    }
    .special-badge {
      background: #2563eb;
      color: #ffffff;
    }
    .people-search-results {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .people-search-results h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #0f172a;
    }
    .people-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: white;
      border: 1px solid #e2e8f0;
    }
    .people-item .avatar-circle {
      width: 42px;
      height: 42px;
      font-size: 0.95rem;
    }
    .people-item strong {
      display: block;
      font-size: 0.96rem;
    }
    .people-item span {
      color: #475569;
      font-size: 0.88rem;
    }
    .post-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      overflow: hidden;
      background: #e2e8f0;
      cursor: zoom-in;
    }
    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .post-image:hover img {
      transform: scale(1.02);
    }
    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .post-body {
      display: grid;
      gap: 8px;
    }
    .post-body h3 {
      margin: 0;
      font-size: 1rem;
      color: #000000;
    }
    .post-body p {
      margin: 0;
      color: #000000;
      line-height: 1.6;
    }
    .post-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-footer button {
      border: none;
      background: #f8fafc;
      border-radius: 9999px;
      padding: 10px 16px;
      cursor: pointer;
      color: #000000;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .post-footer button:hover {
      transform: translateY(-1px);
      background: #eff6ff;
    }
    .empty-state {
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      color: #000000;
    }
    .bottom-nav {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.96);
      border-top: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      max-width: 1000px;
      margin: 0 auto;
      backdrop-filter: blur(14px);
    }
    .nav-button {
      border: none;
      background: transparent;
      color: #000000;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 18px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .nav-button.active,
    .nav-button:hover {
      background: #eff6ff;
      color: #000000;
    }
    .nav-button svg {
      width: 22px;
      height: 22px;
    }
    .page-hidden {
      display: none;
    }
    .post-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.55);
      z-index: 50;
      padding: 24px;
    }
    .post-modal.page-hidden {
      display: none !important;
    }
    .post-modal .modal-card {
      width: min(520px, 100%);
      background: #ffffff;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 40px 90px rgba(15, 23, 42, 0.18);
      display: grid;
      gap: 16px;
    }
    .modal-card input,
    .modal-card textarea,
    .modal-card button {
      width: 100%;
    }
    .modal-card input[type="file"] {
      display: none;
    }
    .file-select-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-select-row .file-button {
      padding: 12px 18px;
      border-radius: 16px;
    }
    .file-select-row .file-hint {
      color: #000000;
      font-size: 0.95rem;
    }
    .modal-card input,
    .modal-card textarea {
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
      background: #f8fafc;
    }
    .modal-card input[readonly] {
      background: #eef2ff;
      cursor: default;
    }
    .modal-card textarea {
      min-height: 120px;
      resize: vertical;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .modal-card button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-card .secondary {
      background: var(--secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .file-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .file-button:hover {
      transform: translateY(-1px);
      background: #1d4ed8;
    }
    .modal-card .secondary {
      background: #f8fafc;
      color: #000000;
      border: 1px solid #cbd5e1;
    }
    .profile-summary,
    .liked-list,
    .settings-panel {
      display: grid;
      gap: 18px;
    }
    .settings-panel {
      background: var(--secondary);
      padding: 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
    }
    .settings-panel h3 {
      margin: 0;
      color: #000000;
      font-size: 1.15rem;
    }
    .field-group {
      display: grid;
      gap: 8px;
    }
    .field-group label {
      font-weight: 700;
      color: #000000;
      font-size: 0.95rem;
    }
    .settings-panel input,
    .settings-panel textarea {
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 14px 16px;
      background: white;
      outline: none;
      font-size: 1rem;
    }
    .settings-panel textarea {
      min-height: 100px;
      resize: vertical;
    }
    .settings-panel input[readonly] {
      background: #eef2ff;
      cursor: default;
    }
    .settings-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding: 16px;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 20px;
    }
    .settings-preview .avatar-circle {
      width: 64px;
      height: 64px;
    }
    .settings-preview strong {
      font-size: 1rem;
      color: #000000;
    }
    .settings-preview span {
      color: #000000;
      font-size: 0.95rem;
    }
    .settings-panel .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .settings-panel .button-row button {
      flex: 1;
      min-width: 140px;
      border-radius: 16px;
      padding: 14px 18px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .settings-panel .button-row button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }
    .settings-panel .button-row .primary {
      background: var(--primary);
      color: white;
    }
    .settings-panel .button-row .secondary {
      background: #ffffff;
      color: #000000;
      border: 1px solid #cbd5e1;
    }
    .settings-panel .button-row .danger {
      background: var(--danger-soft);
      color: #000000;
      border: 1px solid #fecaca;
    }
    .field-group input,
    .field-group textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
      background: white;
    }
    .field-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .profile-head {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .profile-details {
      display: grid;
      gap: 6px;
    }
    .pill {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eff6ff;
      font-size: 0.9rem;
      color: #000000;
    }
    .post-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .post-actions button {
      background: #f8fafc;
      color: #000000;
    }
    .friends-list {
      display: grid;
      gap: 16px;
      padding: 16px;
    }
    .friend-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 20px;
      background: white;
      border: 1px solid #e2e8f0;
    }
    .friend-card .avatar-circle {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    .friend-details {
      flex: 1;
      display: grid;
      gap: 4px;
    }
    .friend-stats {
      color: #000000;
      font-size: 0.92rem;
    }
    .friend-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .friend-actions button {
      min-width: 110px;
      border-radius: 999px;
      padding: 10px 16px;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    .friend-actions button.primary {
      background: var(--primary);
      color: white;
    }
    .friend-actions button.secondary {
      background: var(--secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .following-section {
      margin-top: 16px;
      display: grid;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }
    .following-section h4 {
      margin: 0;
      font-size: 0.95rem;
      color: #0f172a;
      font-weight: 700;
    }
    .following-list {
      display: grid;
      gap: 10px;
    }
    .following-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .following-item strong {
      font-size: 0.95rem;
    }
    .following-item span {
      color: #475569;
      font-size: 0.88rem;
    }
    .special-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0;
      line-height: 1;
    }
    .image-viewer {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.75);
      display: grid;
      place-items: center;
      z-index: 100;
      padding: 24px;
    }
    .image-viewer.page-hidden {
      display: none;
    }
    .image-viewer-card {
      position: relative;
      width: min(90vw, 900px);
      max-height: 90vh;
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.4);
    }
    .image-viewer-card img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 85vh;
      object-fit: contain;
      background: #000;
    }
    .image-viewer-caption {
      padding: 16px;
      color: #000000;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .close-viewer {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.9);
      color: #000000;
      font-size: 1.25rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 12px 24px rgba(15,23,42,0.15);
    }
    .close-viewer:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="topbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.65" y1="16.65" x2="21" y2="21"/></svg>
        <input id="searchInput" placeholder="Search subjects or descriptions" />
      </div>
      <div class="section-title" id="screenTitle">Home</div>
    </div>

    <section class="feed-area" id="homePage"></section>
    <section class="feed-area page-hidden" id="likesPage"></section>
    <section class="feed-area page-hidden" id="friendsPage"></section>
    <section class="feed-area page-hidden" id="newPostPage">
      <div class="modal-card" style="max-width:720px; margin:0 auto;">
        <h3>Create post</h3>
        <div class="field-group">
          <label for="postName">Post as</label>
          <input id="postName" type="text" readonly placeholder="Your name" />
        </div>
        <div class="field-group">
          <label for="postSubject">Subject</label>
          <input id="postSubject" placeholder="Add a subject" />
        </div>
        <div class="field-group">
          <label for="postDescription">Description</label>
          <textarea id="postDescription" placeholder="Write a short caption"></textarea>
        </div>
        <input id="postImage" type="file" accept="image/*" />
        <div class="file-select-row">
          <label class="file-button secondary" for="postImage">Choose image</label>
          <span class="file-hint" id="postImageName">No file chosen</span>
        </div>
        <div class="modal-actions">
          <button type="button" id="publishPost">Publish</button>
          <button type="button" class="secondary" id="cancelPost">Cancel</button>
        </div>
      </div>
    </section>
    <section class="page-hidden" id="profilePage"></section>
    <section class="page-hidden" id="settingsPage"></section>
  </main>

  <div id="imageViewer" class="image-viewer page-hidden">
    <div class="image-viewer-card">
      <button class="close-viewer" id="closeViewer">×</button>
      <img id="viewerImage" src="" alt="Expanded post" />
      <div class="image-viewer-caption" id="viewerCaption"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-button active" id="homeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 22V12h6v10"/></svg>
      Home
    </button>
    <button class="nav-button" id="likesBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l9.8-9.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Likes
    </button>
    <button class="nav-button" id="friendsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-3-3.87"/><path d="M7 21v-2a4 4 0 0 1 3-3.87"/><path d="M12 7a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/><path d="M4 4h16"/></svg>
      Friends
    </button>
    <button class="nav-button" id="postBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Post
    </button>
    <button class="nav-button" id="profileBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-3-3.87"/><path d="M4 21v-2a4 4 0 0 1 3-3.87"/><circle cx="12" cy="7" r="4"/></svg>
      Me
    </button>
    <button class="nav-button" id="settingsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09c0 .67.39 1.26 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.67 0 1.26.39 1.51 1z"/></svg>
      Settings
    </button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentUserId = sessionStorage.getItem('currentUserId');
      const currentUserName = sessionStorage.getItem('welcomeName');
      const currentUserAvatar = sessionStorage.getItem('welcomeAvatarImage');
      const usersKey = 'ch_users';
      const postsKey = 'ch_posts';
      const likesKey = 'ch_likes';

      const homePage = document.getElementById('homePage');
    const likesPage = document.getElementById('likesPage');
    const friendsPage = document.getElementById('friendsPage');
    const newPostPage = document.getElementById('newPostPage');
    const profilePage = document.getElementById('profilePage');
    const settingsPage = document.getElementById('settingsPage');
    const screenTitle = document.getElementById('screenTitle');
    const searchInput = document.getElementById('searchInput');
    const homeBtn = document.getElementById('homeBtn');
    const likesBtn = document.getElementById('likesBtn');
    const friendsBtn = document.getElementById('friendsBtn');
    const postBtn = document.getElementById('postBtn');
    const profileBtn = document.getElementById('profileBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const publishPost = document.getElementById('publishPost');
    const cancelPost = document.getElementById('cancelPost');
    const postName = document.getElementById('postName');
    const postSubject = document.getElementById('postSubject');
    const postDescription = document.getElementById('postDescription');
    const postImage = document.getElementById('postImage');
    const postImageName = document.getElementById('postImageName');
    const imageViewer = document.getElementById('imageViewer');
    const viewerImage = document.getElementById('viewerImage');
    const viewerCaption = document.getElementById('viewerCaption');
    const closeViewer = document.getElementById('closeViewer');

    function loadData(key) {
      return JSON.parse(localStorage.getItem(key) || '[]');
    }
    function saveData(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }
    function getUserById(id) {
      return loadData(usersKey).find((user) => user.id === id);
    }
    function saveUser(user) {
      const users = loadData(usersKey);
      const index = users.findIndex((item) => item.id === user.id);
      if (index >= 0) users[index] = user;
      else users.push(user);
      saveData(usersKey, users);
    }
    function ensureCurrentUser() {
      if (!currentUserId) {
        window.location.href = 'login.html';
        return null;
      }
      let user = getUserById(currentUserId);
      if (!user) {
        user = { id: currentUserId, name: currentUserName || 'You', email: '', avatarImage: currentUserAvatar || null, followers: 0, following: 0, followingList: [] };
        saveUser(user);
      } else {
        user.followingList = user.followingList || [];
      }
      return user;
    }

    const currentUser = ensureCurrentUser();
    if (!currentUser) return;

    function formatUserAvatar(user) {
      if (user.avatarImage) {
        return `<img src="${user.avatarImage}" alt="${user.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
      }
      return `<span>${user.name.trim()[0]?.toUpperCase() || 'A'}</span>`;
    }

    function getUserBadge(user) {
      if (user.email === 'mail2dhev2014@gmail.com') {
        return '<span class="badge special-badge">✓</span>';
      }
      return '';
    }

    function renderPost(post, showDelete) {
      const author = getUserById(post.userId) || { name: 'Unknown', avatarImage: null, followers: 0 };
      const likes = loadData(likesKey).filter((like) => like.postId === post.id);
      const likedByMe = likes.some((like) => like.userId === currentUser.id);
      const badge = author.followers > 100 ? '<span class="badge">VIP</span>' : '';
      const specialBadge = getUserBadge(author);
      return `
        <article class="post-card" data-id="${post.id}">
          <div class="post-header">
            <div class="avatar-circle">${formatUserAvatar(author)}</div>
            <div class="post-meta">
              <strong>${author.name} ${badge} ${specialBadge}</strong>
              <span>${post.subject} · ${new Date(post.createdAt).toLocaleDateString()}</span>
            </div>
          </div>
          ${post.image ? `<div class="post-image"><img src="${post.image}" alt="Post image" /></div>` : ''}
          <div class="post-body">
            <h3>${post.subject}</h3>
            <p>${post.description}</p>
          </div>
          <div class="post-footer">
            <button data-action="like">${likedByMe ? '❤️' : '🤍'} ${likes.length}</button>
            ${showDelete ? '<button data-action="delete">Delete</button>' : ''}
          </div>
        </article>
      `;
    }

    function renderPeopleMatches(users) {
      return `
        <div class="people-search-results">
          <h3>People matching your search</h3>
          ${users.map((user) => `
            <div class="people-item">
              <div class="avatar-circle">${formatUserAvatar(user)}</div>
              <div>
                <strong>${user.name}</strong>
                <span>${user.followers ?? 0} followers · ${user.following ?? 0} following</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderFeed(posts, peopleMatches = []) {
      homePage.innerHTML = '';
      if (peopleMatches.length) {
        const peopleContainer = document.createElement('div');
        peopleContainer.innerHTML = renderPeopleMatches(peopleMatches);
        homePage.append(peopleContainer);
      }
      const visiblePosts = posts;
      if (!visiblePosts.length) {
        homePage.innerHTML += '<div class="empty-state"><p>No posts yet. Open the Post menu to share your first update.</p></div>';
        return;
      }
      visiblePosts.forEach((post) => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = renderPost(post, post.userId === currentUser.id);
        homePage.append(wrapper.firstElementChild);
      });
    }

    function renderLikes() {
      likesPage.innerHTML = '';
      const likedPostIds = loadData(likesKey).filter((like) => like.userId === currentUser.id).map((like) => like.postId);
      const allPosts = loadData(postsKey);
      const likedPosts = allPosts.filter((post) => likedPostIds.includes(post.id));
      if (!likedPosts.length) {
        likesPage.innerHTML = '<div class="empty-state"><p>No liked posts yet. Tap the heart on a post to save it here.</p></div>';
        return;
      }
      likedPosts.forEach((post) => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = renderPost(post, false);
        likesPage.append(wrapper.firstElementChild);
      });
    }

    function getFollowedUsers(user) {
      const followingIds = user.followingList || [];
      return loadData(usersKey).filter((item) => followingIds.includes(item.id));
    }

    function renderFollowingSection(user) {
      const followedUsers = getFollowedUsers(user);
      const title = followedUsers.length ? 'Following' : 'Following (none yet)';
      const items = followedUsers.map((followed) => `
        <div class="following-item">
          <div class="avatar-circle" style="width:36px;height:36px;font-size:.85rem;">${formatUserAvatar(followed)}</div>
          <div>
            <strong>${followed.name}</strong>
            <span>${followed.followers ?? 0} followers · ${followed.following ?? 0} following</span>
          </div>
        </div>
      `).join('');
      return `
        <div class="following-section">
          <h4>${title}</h4>
          <div class="following-list">
            ${items || '<div style="color:#64748b;font-size:.92rem;">This user isn\'t following anyone yet.</div>'}
          </div>
        </div>
      `;
    }

    function renderProfile() {
      const followers = currentUser.followers ?? 0;
      const following = currentUser.following ?? 0;
      const badge = getUserBadge(currentUser);
      profilePage.innerHTML = `
        <div class="profile-summary">
          <div class="profile-head">
            <div class="avatar-circle">${formatUserAvatar(currentUser)}</div>
            <div class="profile-details">
              <strong>${currentUser.name} ${badge}</strong>
              <span>${currentUser.email || ''}</span>
            </div>
          </div>
          <div class="post-actions">
            <div class="pill">Followers ${followers}</div>
            <div class="pill">Following ${following}</div>
          </div>
          ${renderFollowingSection(currentUser)}
        </div>
      `;
    }

    function renderSettings() {
      settingsPage.innerHTML = `
        <div class="settings-panel">
          <div class="settings-preview">
            <div class="avatar-circle">${formatUserAvatar(currentUser)}</div>
            <div>
              <strong>${currentUser.name}</strong>
              <div>${currentUser.email || 'No email added'}</div>
            </div>
          </div>
          <div class="field-group">
            <label for="settingsName">Display name</label>
            <input id="settingsName" value="${currentUser.name}" />
          </div>
          <div class="field-group">
            <label for="settingsEmail">Email address</label>
            <input id="settingsEmail" value="${currentUser.email}" />
          </div>
          <div class="field-group">
            <label for="settingsAvatar">Update avatar</label>
            <input id="settingsAvatar" type="file" accept="image/*" />
          </div>
          <div class="field-group">
            <label>Account actions</label>
            <div class="button-row">
              <button id="saveSettings" class="primary">Save changes</button>
              <button class="danger" id="logoutBtn">Log out</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('saveSettings').addEventListener('click', saveSettings);
      document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('currentUserId');
        window.location.href = 'login.html';
      });
      const avatarInput = document.getElementById('settingsAvatar');
      avatarInput.addEventListener('change', async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          currentUser.avatarImage = reader.result;
          saveUser(currentUser);
          sessionStorage.setItem('welcomeAvatarImage', currentUser.avatarImage);
          renderSettings();
        };
        reader.readAsDataURL(file);
      });
    }

    function saveSettings() {
      const nameInput = document.getElementById('settingsName');
      const emailInput = document.getElementById('settingsEmail');
      currentUser.name = nameInput.value.trim() || currentUser.name;
      currentUser.email = emailInput.value.trim() || currentUser.email;
      saveUser(currentUser);
      renderProfile();
      alert('Profile updated');
    }

    function renderFriendDetail(user) {
      const existing = document.getElementById('friendDetailCard');
      if (existing) existing.remove();
      const detail = document.createElement('div');
      detail.id = 'friendDetailCard';
      detail.className = 'friend-card';
      detail.innerHTML = `
        <div class="avatar-circle">${formatUserAvatar(user)}</div>
        <div class="friend-details">
          <strong>${user.name}</strong>
          <div class="friend-stats">${user.followers ?? 0} followers · ${user.following ?? 0} following</div>
          <p style="margin:10px 0 0;color:#000000;">This is ${user.name}'s public profile. Follow them to see more posts from people you care about.</p>
          ${renderFollowingSection(user)}
        </div>
        <div class="friend-actions">
          <button type="button" class="secondary" data-action="close-detail">Close</button>
        </div>
      `;
      detail.addEventListener('click', (event) => {
        if (event.target.closest('button')?.dataset.action === 'close-detail') {
          detail.remove();
        }
      });
      friendsPage.prepend(detail);
    }

    function followUser(targetId) {
      currentUser.followingList = currentUser.followingList || [];
      const target = getUserById(targetId);
      if (!target) return;
      const index = currentUser.followingList.indexOf(targetId);
      if (index >= 0) {
        currentUser.followingList.splice(index, 1);
        currentUser.following = Math.max(0, (currentUser.following ?? 0) - 1);
        target.followers = Math.max(0, (target.followers ?? 0) - 1);
      } else {
        currentUser.followingList.push(targetId);
        currentUser.following = (currentUser.following ?? 0) + 1;
        target.followers = (target.followers ?? 0) + 1;
      }
      saveUser(currentUser);
      saveUser(target);
    }

    function getPeopleMatches(query) {
      if (!query) return [];
      return loadData(usersKey)
        .filter((user) => user.id !== currentUser.id)
        .filter((user) => user.name.toLowerCase().includes(query) || user.email.toLowerCase().includes(query));
    }

    function renderFriends(filteredUsers = null) {
      friendsPage.innerHTML = '';
      const people = filteredUsers ?? loadData(usersKey).filter((user) => user.id !== currentUser.id);
      if (!people.length) {
        friendsPage.innerHTML = '<div class="empty-state"><p>No other users found yet. Invite friends to join the feed.</p></div>';
        return;
      }
      const list = document.createElement('div');
      list.className = 'friends-list';
      people.forEach((user) => {
        const isFollowing = currentUser.followingList?.includes(user.id);
        const card = document.createElement('div');
        card.className = 'friend-card';
        card.dataset.userId = user.id;
        card.innerHTML = `
          <div class="avatar-circle">${formatUserAvatar(user)}</div>
          <div class="friend-details">
            <strong>${user.name}</strong>
            <div class="friend-stats">${user.followers ?? 0} followers · ${user.following ?? 0} following</div>
          </div>
          <div class="friend-actions">
            <button type="button" class="primary" data-action="view">View profile</button>
            <button type="button" class="secondary" data-action="toggle-follow">${isFollowing ? 'Unfollow' : 'Follow'}</button>
          </div>
        `;
        list.append(card);
      });
      friendsPage.append(list);
      friendsPage.querySelectorAll('.friend-card').forEach((card) => {
        card.addEventListener('click', (event) => {
          const action = event.target.closest('button')?.dataset.action;
          if (!action) return;
          const userId = card.dataset.userId;
          const targetUser = getUserById(userId);
          if (!targetUser) return;
          if (action === 'toggle-follow') {
            followUser(userId);
            renderFriends();
            renderProfile();
          }
          if (action === 'view') {
            renderFriendDetail(targetUser);
          }
        });
      });
    }

    function showPage(pageId, title) {
      document.querySelectorAll('section').forEach((section) => section.classList.add('page-hidden'));
      document.getElementById(pageId).classList.remove('page-hidden');
      screenTitle.textContent = title;
      document.querySelectorAll('.nav-button').forEach((btn) => btn.classList.remove('active'));
      if (pageId === 'homePage') homeBtn.classList.add('active');
      if (pageId === 'likesPage') likesBtn.classList.add('active');
      if (pageId === 'newPostPage') postBtn.classList.add('active');
      if (pageId === 'friendsPage') friendsBtn.classList.add('active');
      if (pageId === 'profilePage') profileBtn.classList.add('active');
      if (pageId === 'settingsPage') settingsBtn.classList.add('active');
    }

    function refreshFeed() {
      const query = searchInput.value.trim().toLowerCase();
      const posts = loadData(postsKey).sort((a,b) => b.createdAt - a.createdAt);
      const filtered = query ? posts.filter((post) => {
        const author = getUserById(post.userId);
        return post.subject.toLowerCase().includes(query) || post.description.toLowerCase().includes(query) || author?.name.toLowerCase().includes(query);
      }) : posts;
      const peopleMatches = query ? getPeopleMatches(query) : [];
      renderFeed(filtered, peopleMatches);
      if (!friendsPage.classList.contains('page-hidden')) {
        renderFriends(peopleMatches.length ? peopleMatches : null);
      }
    }

    searchInput.addEventListener('input', refreshFeed);

    function resetNewPostForm() {
      postSubject.value = '';
      postDescription.value = '';
      postImage.value = '';
      postImageName.textContent = 'No file chosen';
    }

    function showCreatePostPage() {
      showPage('newPostPage', 'Create Post');
      postBtn.classList.add('active');
      if (postName) {
        postName.value = currentUser.name || '';
      }
    }

    homeBtn.addEventListener('click', () => { showPage('homePage', 'Home'); refreshFeed(); });
    likesBtn.addEventListener('click', () => { showPage('likesPage', 'Liked Posts'); renderLikes(); });
    friendsBtn.addEventListener('click', () => { showPage('friendsPage', 'People'); renderFriends(); });
    postBtn.addEventListener('click', showCreatePostPage);
    profileBtn.addEventListener('click', () => { showPage('profilePage', 'My Profile'); renderProfile(); });
    settingsBtn.addEventListener('click', () => { showPage('settingsPage', 'Settings'); renderSettings(); });

    cancelPost.addEventListener('click', (event) => {
      event.preventDefault();
      resetNewPostForm();
      showPage('homePage', 'Home');
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !document.getElementById('newPostPage').classList.contains('page-hidden')) {
        resetNewPostForm();
        showPage('homePage', 'Home');
      }
    });

    postImage.addEventListener('change', () => {
      postImageName.textContent = postImage.files[0]?.name || 'No file chosen';
    });

    publishPost.addEventListener('click', () => {
      const subject = postSubject.value.trim();
      const description = postDescription.value.trim();
      const file = postImage.files[0];
      if (!subject || !description) {
        alert('Subject and description are required.');
        return;
      }
      const savePost = (imageValue) => {
        const posts = loadData(postsKey);
        posts.push({
          id: `post_${Date.now()}`,
          userId: currentUser.id,
          subject,
          description,
          image: imageValue || '',
          createdAt: Date.now()
        });
        saveData(postsKey, posts);
        resetNewPostForm();
        showPage('homePage', 'Home');
        refreshFeed();
      };
      if (file) {
        const reader = new FileReader();
        reader.onload = () => savePost(reader.result);
        reader.readAsDataURL(file);
      } else {
        savePost('');
      }
    });

    function showImageViewer(src, caption) {
      viewerImage.src = src;
      viewerCaption.textContent = caption;
      imageViewer.classList.remove('page-hidden');
    }

    function hideImageViewer() {
      imageViewer.classList.add('page-hidden');
      viewerImage.src = '';
    }

    closeViewer.addEventListener('click', hideImageViewer);
    imageViewer.addEventListener('click', (event) => {
      if (event.target === imageViewer) hideImageViewer();
    });

    homePage.addEventListener('click', (event) => {
      const imageContainer = event.target.closest('.post-image');
      if (imageContainer) {
        const img = imageContainer.querySelector('img');
        const postCard = imageContainer.closest('.post-card');
        const caption = postCard?.querySelector('.post-body h3')?.textContent || '';
        if (img?.src) {
          showImageViewer(img.src, caption);
          return;
        }
      }
      const postCard = event.target.closest('.post-card');
      if (!postCard) return;
      const action = event.target.closest('button')?.dataset.action;
      const postId = postCard.dataset.id;
      if (action === 'like') {
        const likes = loadData(likesKey);
        const existing = likes.find((like) => like.postId === postId && like.userId === currentUser.id);
        if (existing) {
          saveData(likesKey, likes.filter((like) => like !== existing));
        } else {
          likes.push({ postId, userId: currentUser.id });
          saveData(likesKey, likes);
        }
        refreshFeed();
      }
      if (action === 'delete') {
        const posts = loadData(postsKey).filter((post) => post.id !== postId);
        saveData(postsKey, posts);
        refreshFeed();
      }
    });

    renderFeed(loadData(postsKey).sort((a,b) => b.createdAt - a.createdAt));
    });
  </script>
</body>
</html>
